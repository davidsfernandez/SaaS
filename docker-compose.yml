services:
  db:
    image: postgres:17
    container_name: sa_app_db
    restart: always
    environment:
      - POSTGRES_DB=SA_AppDB
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      # Direct mount to local folder for absolute persistence
      - ./.docker/db_data:/var/lib/postgresql/data

  app:
    image: saas_asaas_app:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sa_app_web
    restart: always
    env_file:
      - .env
    ports:
      - "5000:8080"
    volumes:
      # Persistent volume for user files
      - ./.docker/user_uploads:/app/wwwroot/uploads
      # Persistent volume for ASP.NET DataProtection keys (avoids Antiforgery/Login errors on restart)
      - ./.docker/dp_keys:/root/.aspnet/DataProtection-Keys
      # Persistent volume for structured logs
      - ./.docker/logs:/app/Logs
    depends_on:
      - db
